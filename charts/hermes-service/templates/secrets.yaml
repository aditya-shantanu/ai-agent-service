{{- if not .Values.secrets.platform.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: hermes-platform-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: hermes-service
type: Opaque
stringData:
  dashboard-username: platform
  dashboard-password: {{ include "hermes.stickySecretValue" (dict "ns" .Release.Namespace "name" "hermes-platform-secrets" "key" "dashboard-password" "len" 32) | quote }}
  dashboard-session-secret: {{ include "hermes.stickySecretValue" (dict "ns" .Release.Namespace "name" "hermes-platform-secrets" "key" "dashboard-session-secret" "len" 64) | quote }}
  api-server-key: {{ include "hermes.stickySecretValue" (dict "ns" .Release.Namespace "name" "hermes-platform-secrets" "key" "api-server-key" "len" 48) | quote }}
{{- end }}
---
{{- if not .Values.secrets.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: hermes-gateway-admin
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: hermes-service
type: Opaque
stringData:
  admin-token: {{ include "hermes.stickySecretValue" (dict "ns" .Release.Namespace "name" "hermes-gateway-admin" "key" "admin-token" "len" 48) | quote }}
{{- end }}
---
{{- if and (not .Values.secrets.providerKeys.existingSecret) (not .Values.secrets.providerKeys.externalSecret.enabled) }}
# Placeholder provider-keys secret so the SandboxTemplate envFrom resolves.
# Chat will fail until real keys are added:
#   kubectl -n {{ .Release.Namespace }} create secret generic hermes-provider-keys \
#     --from-literal=GEMINI_API_KEY=... --dry-run=client -o yaml | kubectl apply -f -
# (then suspend/resume or recreate sandboxes to pick up the new env)
apiVersion: v1
kind: Secret
metadata:
  name: hermes-provider-keys
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: hermes-service
type: Opaque
{{- $existing := lookup "v1" "Secret" .Release.Namespace "hermes-provider-keys" }}
{{- if and $existing $existing.data }}
data:
{{- range $k, $v := $existing.data }}
  {{ $k }}: {{ $v }}
{{- end }}
{{- end }}
{{- end }}
