{{- if .Values.secrets.providerKeys.externalSecret.enabled }}
# Provider keys synced from Google Secret Manager by External Secrets
# Operator (installed by `make eso-install`). Auth is Workload Identity:
# the ESO controller's pod identity is granted secretAccessor on the GSM
# secret — no service-account key files anywhere.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: hermes-service
spec:
  provider:
    gcpsm:
      projectID: {{ required "secrets.providerKeys.externalSecret.gcpProjectID is required" .Values.secrets.providerKeys.externalSecret.gcpProjectID }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-provider-keys
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: hermes-service
spec:
  refreshInterval: {{ .Values.secrets.providerKeys.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: SecretStore
    name: gcp-secret-manager
  target:
    name: {{ include "hermes.providerSecretName" . }}
    creationPolicy: Owner
  # The GSM secret payload is a JSON object of env-var-name -> key
  # (produced by `make gsm-push-key` from the local .env). Every JSON key
  # becomes a Secret key, injected into sandboxes via envFrom.
  dataFrom:
    - extract:
        key: {{ .Values.secrets.providerKeys.externalSecret.gsmSecretName }}
{{- end }}
