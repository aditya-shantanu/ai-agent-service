# GKE overlay for project gke-ai-eco-dev.
# Images must be pushed to Artifact Registry first (make images-push).
gateway:
  # Replace REGION/PROJECT/REPO via --set or edit after creating the repo:
  image: us-central1-docker.pkg.dev/gke-ai-eco-dev/hermes-service/hermes-gateway:latest
  imagePullPolicy: Always
  service:
    type: LoadBalancer

hermes:
  # Mirrored upstream image (Docker Hub rate limits + supply-chain pinning).
  image: us-central1-docker.pkg.dev/gke-ai-eco-dev/hermes-service/hermes-agent:v2026.7.7.2

sandbox:
  storage:
    storageClassName: ""   # GKE default (standard-rwo)
