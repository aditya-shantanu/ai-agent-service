# GKE overlay. Image paths and the ESO project ID are placeholders —
# `make deploy-gke` injects the real values from GCP_PROJECT/AR_REPO via
# --set-string, or pass your own with helm --set.
gateway:
  image: REGION-docker.pkg.dev/PROJECT_ID/hermes-service/hermes-gateway:latest
  imagePullPolicy: Always
  service:
    type: LoadBalancer

hermes:
  # Mirrored upstream image (Docker Hub rate limits + supply-chain pinning).
  image: REGION-docker.pkg.dev/PROJECT_ID/hermes-service/hermes-agent:v2026.7.7.2

idle:
  # Production UX posture (investigations/resume-latency-and-storage.md):
  # most returns land on a swapped-resident agent (sub-second page-in)
  # instead of paying a cold resume. ~+$0.06/agent on the swap pool.
  activeTimeout: 10m

sandbox:
  # Kernel-syscall isolation: agents run inside gVisor (GKE Sandbox) on the
  # hermes-gvisor-pool (hack/gke-gvisor-pool.sh). GKE's gvisor RuntimeClass
  # auto-adds the sandbox.gke.io/runtime nodeSelector + toleration.
  # Rollback: comment this out and cycle warm spares (pods land back on the
  # runc swap pool via the hermes-swap selector below).
  runtimeClassName: gvisor
  storage:
    storageClassName: ""   # GKE default (standard-rwo)
  # Sandboxes run on the swap-enabled Spot pool (hack/gke-swap-pool.sh;
  # gcloud-managed until the Terraform provider exposes swapConfig).
  # Spot preemption == an unscheduled suspend; the platform absorbs it.
  # Rollback: flip selectors back to hermes-sandbox (terraform sandbox-pool).
  nodeSelector:
    hermes-swap: "true"
  tolerations:
    - key: hermes-swap
      operator: Equal
      value: "true"
      effect: NoSchedule

secrets:
  providerKeys:
    externalSecret:
      enabled: true
      gcpProjectID: PROJECT_ID
