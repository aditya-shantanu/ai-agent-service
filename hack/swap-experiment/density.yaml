# Density-test Deployment: raw Hermes pods (same image/env as sandboxes)
# with aggressive requests, pinned to the swap pool. Scale with:
#   kubectl -n hermes-users scale deploy/swap-density --replicas=N
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swap-density
  namespace: hermes-users
  labels: {app: swap-density}
spec:
  replicas: 0
  selector: {matchLabels: {app: swap-density}}
  template:
    metadata:
      labels: {app: swap-density}
    spec:
      nodeSelector: {hermes-swap: "true"}
      tolerations:
        - {key: hermes-swap, operator: Equal, value: "true", effect: NoSchedule}
      securityContext: {runAsUser: 10000, runAsGroup: 10000, fsGroup: 10000, runAsNonRoot: true}
      containers:
        - name: hermes
          image: us-central1-docker.pkg.dev/gke-ai-eco-dev/hermes-service/hermes-agent:v2026.7.7.2
          args: ["sleep", "infinity"]
          env:
            - {name: HERMES_DASHBOARD, value: "1"}
            - {name: HERMES_DASHBOARD_HOST, value: "0.0.0.0"}
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              valueFrom: {secretKeyRef: {name: hermes-platform-secrets, key: dashboard-username}}
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom: {secretKeyRef: {name: hermes-platform-secrets, key: dashboard-password}}
            - name: HERMES_DASHBOARD_BASIC_AUTH_SECRET
              valueFrom: {secretKeyRef: {name: hermes-platform-secrets, key: dashboard-session-secret}}
            - {name: HERMES_GATEWAY_BOOTSTRAP_STATE, value: "running"}
            - {name: API_SERVER_ENABLED, value: "true"}
            - {name: API_SERVER_HOST, value: "0.0.0.0"}
            - name: API_SERVER_KEY
              valueFrom: {secretKeyRef: {name: hermes-platform-secrets, key: api-server-key}}
          envFrom: [{secretRef: {name: hermes-provider-keys}}]
          # Aggressive: hot-set-sized requests; swap absorbs the cold overflow.
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "2", memory: 2Gi}
          readinessProbe:
            tcpSocket: {port: 9119}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          # No PVC: density test uses ephemeral state (fine for measurement).
